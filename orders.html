<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Jimlat Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <div class="admin-layout">

    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">
        <h1>Jimlat Admin</h1>
        <span>Store Management</span>
      </div>
      <nav class="admin-sidebar-nav">
        <a href="dashboard.html" class="admin-nav-link">
          <span class="admin-nav-icon">📊</span>Dashboard
        </a>
        <a href="orders.html" class="admin-nav-link active">
          <span class="admin-nav-icon">📦</span>Orders
        </a>
        <a href="products.html" class="admin-nav-link">
          <span class="admin-nav-icon">👕</span>Products
        </a>
        <a href="add-product.html" class="admin-nav-link">
          <span class="admin-nav-icon">➕</span>Add Product
        </a>
        <a href="../index.html" target="_blank" class="admin-nav-link">
          <span class="admin-nav-icon">🌐</span>View Store
        </a>
      </nav>
      <div class="admin-sidebar-footer">
        <div class="admin-user-info">
          <div class="admin-user-avatar">A</div>
          <span class="admin-name">Admin</span>
        </div>
        <button class="admin-logout-btn" onclick="AdminAuth.logout()">
          🚪 Sign Out
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h2 class="admin-page-title">Orders</h2>
        <div class="filter-buttons">
          <button class="filter-btn active"
                  data-status-filter="all">All</button>
          <button class="filter-btn"
                  data-status-filter="pending">Pending</button>
          <button class="filter-btn"
                  data-status-filter="shipped">Shipped</button>
          <button class="filter-btn"
                  data-status-filter="delivered">Delivered</button>
          <button class="filter-btn"
                  data-status-filter="cancelled">Cancelled</button>
        </div>
      </div>

      <div class="admin-content">
        <div class="admin-card">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Update Status</th>
              </tr>
            </thead>
            <tbody id="ordersTableBody">
              <tr>
                <td colspan="7" class="loading-row">Loading orders...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

  </div>

  <div class="admin-notifications"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script>
    Admin.initOrdersPage();
  </script>

</body>
</html>
